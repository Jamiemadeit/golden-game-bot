name: Golden Game Reminders

on:
  schedule:
    - cron: "*/15 8-20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: reminders
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send reminders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LEAD_MINUTES: "15"
          SUMMARY_HOUR: "9"
        run: cd golden-game-bot && python send_reminders.py

      - name: Save sent-state
        run: |
          cd golden-game-bot
          git config user.name  "golden-game-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/sent.json || true
          git commit -m "update reminder state [skip ci]" || echo "nothing to commit"
          git pull --rebase --autostash || true
          git push || echo "nothing to push"
